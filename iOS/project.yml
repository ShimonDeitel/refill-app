name: Refill
options:
  bundleIdPrefix: com.shimondeitel.rxcost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Refill:
    type: application
    platform: iOS
    sources:
      - path: Refill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rxcost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Refill/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RefillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RefillTests
      - path: Refill.storekit
    dependencies:
      - target: Refill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rxcost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RefillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RefillUITests
    dependencies:
      - target: Refill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.rxcost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Refill:
    build:
      targets:
        Refill: all
        RefillTests: [test]
        RefillUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Refill.storekit
    test:
      config: Debug
      storeKitConfiguration: Refill.storekit
      targets:
        - RefillTests
        - RefillUITests
    archive:
      config: Release
